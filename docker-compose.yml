services:

  # ─── Local ARES State DB (Internal Logs/Events) ─────────────
  ares-db:
    image: postgres:15-alpine
    container_name: ares-db
    environment:
      POSTGRES_DB: ares_db
      POSTGRES_USER: ares_user
      POSTGRES_PASSWORD: ares_password
    volumes:
      - postgres-ares:/var/lib/postgresql/data
    networks:
      - ares-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ares_user -d ares_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── LUMIERE Microservices (The Patient) ─────────────────────
  # These will use the cloud Neon URLs from your .env file
  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    env_file: .env
    networks:
      - ares-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  product-service:
    build: ./backend/product-service
    container_name: product-service
    ports:
      - "3002:3002"
    env_file: .env
    networks:
      - ares-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  cart-service:
    build: ./backend/cart-service
    container_name: cart-service
    ports:
      - "3003:3003"
    env_file: .env
    networks:
      - ares-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-service:
    build: ./backend/order-service
    container_name: order-service
    ports:
      - "3004:3004"
    env_file: .env
    networks:
      - ares-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Helios ML Engine (The Brain) ──────────────────────────
  helios-ml-engine:
    build: ./helios
    container_name: helios-ml-engine
    ports:
      - "5000:5000"
    networks:
      - ares-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── ARES Control API (Central Hub) ────────────────────────
  ares-api:
    build: ./ares-control/api
    container_name: ares-api
    ports:
      - "8000:8000"
    environment:
      - ARES_DB_URL=postgresql://ares_user:ares_password@ares-db:5432/ares_db
    networks:
      - ares-net
    depends_on:
      ares-db:
        condition: service_healthy
    restart: unless-stopped

  # ─── ARES Agents (The Nervous System) ───────────────────────
  monitoring-agent:
    build: ./ares-control
    container_name: monitoring-agent
    command: python agents/monitoring_agent.py
    environment:
      - HELIOS_URL=http://helios-ml-engine:5000
      - ARES_API_URL=http://ares-api:8000
      - SERVICES=user-service:3001,product-service:3002,cart-service:3003,order-service:3004
      - POLL_INTERVAL=15
    networks:
      - ares-net
    depends_on:
      - ares-api
      - helios-ml-engine
    restart: unless-stopped

  health-agent:
    build: ./ares-control
    container_name: health-agent
    command: python agents/health_agent.py
    environment:
      - ARES_API_URL=http://ares-api:8000
      - SERVICES=user-service:3001,product-service:3002,cart-service:3003,order-service:3004
      - HEALTH_INTERVAL=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ares-net
    depends_on:
      - ares-api
    restart: unless-stopped

  # ─── Observability (Visuals) ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ares-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3005:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - ares-net
    restart: unless-stopped

networks:
  ares-net:
    driver: bridge

volumes:
  postgres-ares:
  prometheus-data: